name: Daily ClawFeed

on:
  schedule:
    # 每天 UTC 00:00 触发 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai # 设置时区为中国

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # 这个项目看起来支持现代 Node 版本

      - name: Install dependencies
        run: npm ci

      - name: Run ClawFeed
        # 这里就是我们刚刚找到的命令
        run: node src/server.mjs
