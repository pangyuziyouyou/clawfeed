name: Daily RSS Digest

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 00:00 (北京时间 08:00)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # 或者你项目需要的版本

      - name: Install dependencies
        run: npm ci

      - name: Run script
        run: npm run start # 或者你项目的实际启动命令
